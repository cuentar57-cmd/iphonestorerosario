<!doctype html>
<meta charset="utf-8">
<title>Prueba recorte 1.7</title>
<pre id="out">Iniciando…</pre>
<script type="module">
const out=document.getElementById('out');
const show=value=>{out.textContent=typeof value==='string'?value:JSON.stringify(value,null,2);};
try{
  show('Importando módulo 1.7…');
  const module=await import('https://esm.sh/@imgly/background-removal@1.7.0?bundle&deps=onnxruntime-web@1.21.0');
  const removeBackground=module.removeBackground||module.default;
  const canvas=document.createElement('canvas');
  canvas.width=128;canvas.height=128;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,128,128);
  ctx.fillStyle='#111';ctx.fillRect(36,20,56,96);
  const input=await new Promise(resolve=>canvas.toBlob(resolve,'image/png'));
  show('Procesando con 1.7…');
  const result=await removeBackground(input,{
    device:'cpu',
    model:'isnet_quint8',
    output:{format:'image/png',quality:1,type:'foreground'}
  });
  show({ok:true,type:result.type,size:result.size});
}catch(error){
  show({ok:false,name:error?.name,message:error?.message,text:String(error),keys:error&&typeof error==='object'?Object.keys(error):[]});
  console.error(error);
}
</script>
