<!doctype html>
<meta charset="utf-8">
<title>Prueba de recorte</title>
<pre id="out">Iniciando…</pre>
<script type="module">
const out=document.getElementById('out');
const show=value=>{out.textContent=typeof value==='string'?value:JSON.stringify(value,null,2);};
try{
  show('Importando módulo…');
  const module=await import('https://esm.sh/@imgly/background-removal@1.4.5?bundle');
  const removeBackground=module.removeBackground||module.default;
  const canvas=document.createElement('canvas');
  canvas.width=64;canvas.height=64;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,64,64);
  ctx.fillStyle='#111';ctx.fillRect(18,10,28,48);
  const input=await new Promise(resolve=>canvas.toBlob(resolve,'image/png'));
  show('Procesando…');
  const result=await removeBackground(input,{
    publicPath:new URL('./bg-model/',location.href).href,
    model:'small',
    proxyToWorker:false,
    output:{format:'image/png',quality:1}
  });
  show({ok:true,type:result.type,size:result.size});
}catch(error){
  show({
    ok:false,
    name:error?.name,
    message:error?.message,
    text:String(error),
    keys:error&&typeof error==='object'?Object.keys(error):[]
  });
  console.error(error);
}
</script>
